<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DueTrack — Customer Due Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --paper:#F7F8F4;
    --surface:#FFFFFF;
    --ink:#1C2321;
    --ink-soft:#5B6660;
    --ink-faint:#92998F;
    --pine:#14342B;
    --pine-light:#1F4B3F;
    --pine-pale:#E7EEEA;
    --marigold:#D98E3B;
    --marigold-soft:#FBE9D2;
    --marigold-deep:#9C5E1B;
    --sage:#4F7A52;
    --sage-soft:#E1ECE0;
    --brick:#C0533E;
    --brick-soft:#F8E3DE;
    --border:#E5E7E0;
    --shadow-sm:0 1px 2px rgba(20,52,43,0.06);
    --shadow-md:0 10px 28px rgba(20,52,43,0.10);
    --shadow-lg:0 24px 56px rgba(20,52,43,0.18);
    --r-lg:20px;
    --r-md:14px;
    --r-sm:10px;
    --font-ui:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
    --font-mono:'JetBrains Mono',monospace;
    --sidebar-w:264px;
  }

  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-ui);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  body.no-scroll{overflow:hidden;}
  h1,h2,h3,h4{margin:0;font-family:var(--font-ui);letter-spacing:-0.01em;}
  p{margin:0;}
  ul{list-style:none;margin:0;padding:0;}
  button{font-family:var(--font-ui);cursor:pointer;}
  input,textarea,select{font-family:var(--font-ui);}
  a{color:inherit;}
  ::selection{background:var(--marigold-soft);color:var(--marigold-deep);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
  }

  /* ---------- shared utility ---------- */
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
  .icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
  .icon svg{display:block;}

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    border:none;border-radius:var(--r-sm);font-weight:700;font-size:14px;
    padding:12px 20px;transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
    white-space:nowrap;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--pine);color:#fff;box-shadow:var(--shadow-sm);}
  .btn-primary:hover{background:var(--pine-light);box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .btn-secondary{background:var(--surface);color:var(--ink);border:1.5px solid var(--border);}
  .btn-secondary:hover{border-color:var(--pine);color:var(--pine);}
  .btn-danger{background:var(--brick);color:#fff;}
  .btn-danger:hover{background:#a8432f;box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .btn-ghost-disabled{background:var(--pine-pale);color:var(--ink-faint);cursor:not-allowed;border:1.5px dashed var(--border);}
  .btn-block{width:100%;}
  .btn-sm{padding:9px 14px;font-size:13px;}

  /* ---------- toast ---------- */
  #toast-region{position:fixed;top:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
  .toast{
    pointer-events:auto;
    display:flex;align-items:flex-start;gap:12px;
    background:var(--surface);border-radius:var(--r-md);box-shadow:var(--shadow-lg);
    padding:14px 16px;min-width:280px;max-width:360px;
    border-left:4px solid var(--sage);
    animation:toastIn .3s cubic-bezier(.2,.9,.3,1.2);
  }
  .toast.toast-error{border-left-color:var(--brick);}
  .toast-icon{flex-shrink:0;margin-top:1px;color:var(--sage);}
  .toast.toast-error .toast-icon{color:var(--brick);}
  .toast-text{font-size:13.5px;font-weight:600;color:var(--ink);}
  @keyframes toastIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}

  /* ---------- auth screens ---------- */
  .auth-shell{display:flex;min-height:100vh;}
  .auth-brand{
    flex:1.05;background:var(--pine);color:#fff;
    padding:56px 64px;display:flex;flex-direction:column;justify-content:space-between;
    position:relative;overflow:hidden;
  }
  .auth-brand .shape{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5;}
  .shape-a{width:220px;height:220px;background:radial-gradient(circle,rgba(217,142,59,.35),transparent 70%);top:-60px;right:-40px;animation:floatY 7s ease-in-out infinite;}
  .shape-b{width:160px;height:160px;background:radial-gradient(circle,rgba(79,122,82,.4),transparent 70%);bottom:40px;left:-50px;animation:floatY 9s ease-in-out infinite 1s;}
  @keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
  .brand-mark{display:flex;align-items:center;gap:10px;position:relative;z-index:2;}
  .brand-badge{width:38px;height:38px;border-radius:11px;background:var(--marigold);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;color:var(--pine);font-size:15px;}
  .brand-name{font-size:18px;font-weight:800;letter-spacing:-0.01em;}
  .brand-copy{position:relative;z-index:2;max-width:380px;}
  .brand-copy h1{font-size:32px;font-weight:800;line-height:1.2;margin-bottom:14px;}
  .brand-copy p{color:rgba(255,255,255,.7);font-size:15px;line-height:1.6;}
  .ledger-illustration{position:relative;z-index:2;margin-top:32px;}
  .auth-foot{position:relative;z-index:2;color:rgba(255,255,255,.45);font-size:12.5px;}

  .auth-form-panel{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;background:var(--paper);}
  .auth-card{width:100%;max-width:400px;background:var(--surface);border-radius:var(--r-lg);padding:40px 36px;box-shadow:var(--shadow-lg);border:1px solid var(--border);animation:fadeUp .35s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .auth-card .mobile-logo{display:none;align-items:center;gap:10px;margin-bottom:24px;}
  .auth-card h2{font-size:22px;font-weight:800;margin-bottom:6px;}
  .auth-sub{color:var(--ink-soft);font-size:14px;margin-bottom:26px;}
  .auth-switch{margin-top:22px;text-align:center;font-size:13.5px;color:var(--ink-soft);}
  .auth-switch button{background:none;border:none;color:var(--pine);font-weight:700;cursor:pointer;font-size:13.5px;padding:0;}
  .auth-error-banner{display:none;align-items:center;gap:8px;background:var(--brick-soft);color:var(--brick);border-radius:var(--r-sm);padding:10px 12px;font-size:13px;font-weight:600;margin-bottom:18px;}
  .auth-error-banner.show{display:flex;}

  @media (max-width:899px){
    .auth-brand{display:none;}
    .auth-card .mobile-logo{display:flex;}
  }

  /* ---------- form fields (shared) ---------- */
  .field{margin-bottom:18px;}
  .field label{display:block;font-weight:700;font-size:13px;margin-bottom:7px;color:var(--ink);}
  .field .hint{font-weight:500;color:var(--ink-faint);font-size:12px;}
  .field input, .field textarea{
    width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);
    font-size:14.5px;color:var(--ink);background:var(--surface);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field textarea{resize:vertical;min-height:64px;}
  .field input:focus, .field textarea:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px rgba(20,52,43,.12);}
  .field input.error, .field textarea.error{border-color:var(--brick);}
  .field input.error:focus, .field textarea.error:focus{box-shadow:0 0 0 3px rgba(192,83,62,.14);}
  .error-text{display:none;align-items:center;gap:5px;color:var(--brick);font-size:12.5px;font-weight:600;margin-top:6px;}
  .error-text.show{display:flex;}
  .form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}

  /* ---------- app shell ---------- */
  .app-shell{display:flex;min-height:100vh;}
  .sidebar-overlay{display:none;}
  .sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(20,52,43,.42);z-index:90;animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

  .sidebar{
    width:var(--sidebar-w);background:var(--pine);color:#fff;
    position:fixed;top:0;left:0;bottom:0;z-index:95;
    display:flex;flex-direction:column;padding:24px 18px;
    transform:translateX(-100%);transition:transform .25s ease;
  }
  .sidebar.open{transform:translateX(0);}

  .sidebar-logo{display:flex;align-items:center;gap:10px;padding:6px 10px 22px;}
  .sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1;}
  .nav-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.4);padding:14px 14px 8px;}
  .nav-item{
    display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-sm);
    color:rgba(255,255,255,.74);font-weight:700;font-size:14px;transition:background .15s ease,color .15s ease;
    border:none;background:none;width:100%;text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
  .nav-item.active{background:rgba(255,255,255,.15);color:#fff;}
  .nav-item .icon{color:inherit;}
  .nav-item-soon{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-sm);color:rgba(255,255,255,.32);font-weight:700;font-size:14px;cursor:not-allowed;}
  .soon-pill{margin-left:auto;font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;background:rgba(255,255,255,.1);padding:3px 7px;border-radius:999px;color:rgba(255,255,255,.55);}
  .sidebar-divider{height:1px;background:rgba(255,255,255,.1);margin:14px 4px;}

  .account-card{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--r-md);background:rgba(255,255,255,.06);margin-top:8px;}
  .account-avatar{width:36px;height:36px;border-radius:10px;background:var(--marigold);color:var(--pine);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
  .account-meta{min-width:0;}
  .account-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .account-email{font-size:11.5px;color:rgba(255,255,255,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sidebar-version{font-size:11px;color:rgba(255,255,255,.3);text-align:center;margin-top:14px;}

  .main-area{flex:1;min-width:0;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:60;
  }
  .topbar-title{font-size:16px;font-weight:800;}
  .hamburger-btn{background:none;border:1.5px solid var(--border);border-radius:10px;padding:8px;display:flex;color:var(--ink);}
  .topbar-add{background:var(--pine);color:#fff;border:none;border-radius:10px;padding:8px;display:flex;}

  .main-content{padding:32px 40px 60px;animation:fadeIn .3s ease;max-width:1280px;}

  @media (min-width:1024px){
    .topbar{display:none;}
    .sidebar{transform:none;}
    .main-area{margin-left:var(--sidebar-w);}
  }
  @media (max-width:1023px){
    .main-content{padding:22px 20px 50px;}
  }
  @media (max-width:639px){
    .main-content{padding:18px 14px 44px;}
    .form-grid-2{grid-template-columns:1fr;}
  }

  /* ---------- page header ---------- */
  .page-head{margin-bottom:28px;}
  .page-head h1{font-size:25px;font-weight:800;}
  .page-head p{color:var(--ink-soft);font-size:14.5px;margin-top:6px;}
  .page-head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}

  /* ---------- cards ---------- */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);}

  /* ---------- stats grid ---------- */
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:32px;}
  @media (max-width:1023px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:539px){.stats-grid{grid-template-columns:1fr;}}
  .stat-card{
    padding:22px;transition:transform .18s ease, box-shadow .18s ease;
  }
  .stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
  .stat-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .stat-value{font-family:var(--font-mono);font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink);}
  .stat-label{font-size:13px;font-weight:600;color:var(--ink-soft);margin-top:6px;}

  /* ---------- ledger amount styling ---------- */
  .amt{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:13.5px;font-weight:600;padding-left:9px;border-left:3px solid var(--ink-faint);color:var(--ink);white-space:nowrap;}
  .amt-total{border-left-color:var(--pine);}
  .amt-paid{border-left-color:var(--sage);}
  .amt-due{border-left-color:var(--marigold);color:var(--marigold-deep);}
  .progress-track{width:74px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:7px;margin-left:9px;}
  .progress-fill{height:100%;border-radius:2px;transition:width .3s ease;}
  .progress-label{font-size:10.5px;color:var(--ink-faint);margin-top:3px;margin-left:9px;font-weight:600;}

  /* ---------- badges ---------- */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
  .badge-pending{background:var(--marigold-soft);color:var(--marigold-deep);}
  .badge-paid{background:var(--sage-soft);color:var(--sage);}

  /* ---------- section card (recent / list) ---------- */
  .section-card{padding:24px;}
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
  .section-head h3{font-size:16px;font-weight:800;}
  .link-btn{background:none;border:none;color:var(--pine);font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:4px;padding:0;}
  .link-btn:hover{color:var(--pine-light);text-decoration:underline;}

  /* ---------- table ---------- */
  .table-wrap{overflow-x:auto;margin:0 -4px;}
  table{width:100%;border-collapse:separate;border-spacing:0;min-width:760px;}
  thead th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:800;
    color:var(--ink-faint);padding:0 16px 12px;border-bottom:1.5px solid var(--border);white-space:nowrap;
  }
  tbody td{padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:14px;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr{transition:background .12s ease;}
  tbody tr:hover{background:var(--paper);}
  .cell-name{font-weight:700;color:var(--ink);}
  .cell-phone{font-family:var(--font-mono);font-size:13px;color:var(--ink-soft);}
  .cell-service{color:var(--ink-soft);font-size:13.5px;max-width:180px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cell-date{color:var(--ink-faint);font-size:12.5px;}
  .row-actions{display:flex;gap:6px;}
  .icon-btn{width:32px;height:32px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);transition:all .15s ease;}
  .icon-btn:hover{border-color:var(--pine);color:var(--pine);background:var(--pine-pale);}
  .icon-btn-danger:hover{border-color:var(--brick);color:var(--brick);background:var(--brick-soft);}

  /* ---------- toolbar (customer list) ---------- */
  .list-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .search-box{position:relative;flex:1;min-width:220px;max-width:340px;}
  .search-box .icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-faint);}
  .search-box input{width:100%;padding:11px 14px 11px 38px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;background:var(--surface);transition:border-color .15s ease, box-shadow .15s ease;}
  .search-box input:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px rgba(20,52,43,.12);}
  .pill-group{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;color:var(--ink-soft);transition:all .15s ease;}
  .pill:hover{border-color:var(--pine);}
  .pill.active{background:var(--pine);border-color:var(--pine);color:#fff;}
  .pill-count{font-family:var(--font-mono);font-size:11px;opacity:.75;}
  .sort-btn{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;color:var(--ink-soft);margin-left:auto;}
  .sort-btn:hover{border-color:var(--pine);color:var(--pine);}
  .results-count{font-size:12.5px;color:var(--ink-faint);margin-bottom:14px;font-weight:600;}

  /* ---------- pagination ---------- */
  .pagination{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:22px;}
  .page-nav-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--ink);transition:all .15s ease;}
  .page-nav-btn:hover:not(:disabled){border-color:var(--pine);color:var(--pine);}
  .page-nav-btn:disabled{opacity:.35;cursor:not-allowed;}
  .page-label{font-size:13px;font-weight:700;color:var(--ink-soft);}

  /* ---------- empty states ---------- */
  .empty-state{text-align:center;padding:56px 20px;}
  .empty-icon{width:56px;height:56px;border-radius:16px;background:var(--pine-pale);color:var(--pine);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
  .empty-state h4{font-size:16px;font-weight:800;margin-bottom:6px;}
  .empty-state p{color:var(--ink-soft);font-size:13.5px;max-width:320px;margin:0 auto 20px;}

  /* ---------- add due form ---------- */
  .form-card{padding:32px;max-width:680px;}
  .due-preview{
    background:var(--marigold-soft);border-radius:var(--r-md);padding:18px 20px;margin:22px 0 26px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  }
  .due-preview-label{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--marigold-deep);}
  .due-preview-sub{font-size:12px;color:var(--marigold-deep);opacity:.75;margin-top:2px;}
  .due-preview-value{font-family:var(--font-mono);font-size:30px;font-weight:700;color:var(--marigold-deep);font-variant-numeric:tabular-nums;}
  .due-warning{display:none;align-items:center;gap:6px;color:var(--brick);font-size:12.5px;font-weight:700;margin-top:8px;}
  .due-warning.show{display:flex;}
  .form-actions{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}

  /* ---------- modal ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(20,52,43,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .18s ease;}
  .modal-card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:480px;padding:28px;animation:modalIn .22s cubic-bezier(.2,.9,.3,1.1);max-height:88vh;overflow-y:auto;}
  @keyframes modalIn{from{transform:translateY(14px) scale(.97);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
  .modal-card.modal-wide{max-width:540px;}
  .modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;}
  .modal-close{background:none;border:none;color:var(--ink-faint);padding:4px;border-radius:8px;}
  .modal-close:hover{background:var(--paper);color:var(--ink);}
  .modal-title{font-size:19px;font-weight:800;}
  .modal-warn-icon{width:48px;height:48px;border-radius:14px;background:var(--brick-soft);color:var(--brick);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .modal-text{color:var(--ink-soft);font-size:14px;line-height:1.6;margin:10px 0 22px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;flex-wrap:wrap;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 20px;margin:20px 0;}
  .detail-item label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);margin-bottom:5px;}

/* ---------------- helpers ---------------- */
function uid(){ return 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(ch){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];
  });
}
function fmt(n){
  const num = Number(n) || 0;
  return '₹' + num.toLocaleString('en-IN', { maximumFractionDigits: 2 });
}
function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) + ', ' +
         d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
}
function isSameDay(iso){
  const d = new Date(iso), n = new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}
function isValidEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function isValidPhone(v){ return /^\+?[0-9]{7,15}$/.test(String(v).replace(/[\s-]/g,'')); }
function initialsOf(name){
  const parts = String(name||'').trim().split(/\s+/);
  return ((parts[0]||'')[0]||'D').toUpperCase() + ((parts[1]||'')[0]||'').toUpperCase();
}

/* ---------------- API client ----------------
   All data now lives in a real PostgreSQL database behind the
   DueTrack API. This client wraps fetch() with the JWT auth token
   and consistent error handling. Set window.DUETRACK_API_BASE
   before this script runs (or edit API_BASE below) to point at
   your deployed backend, e.g. https://your-api.onrender.com/api
------------------------------------------------ */
const API_BASE = window.DUETRACK_API_BASE || 'https://duetrack.onrender.com/api';;
const TOKEN_KEY = 'duetrack_token';

function getToken(){ try{ return localStorage.getItem(TOKEN_KEY); }catch(e){ return null; } }
function setToken(t){ try{ localStorage.setItem(TOKEN_KEY, t); }catch(e){} }
function clearToken(){ try{ localStorage.removeItem(TOKEN_KEY); }catch(e){} }

async function api(path, options){
  options = options || {};
  const headers = Object.assign({ 'Content-Type': 'application/json' }, options.headers || {});
  const token = getToken();
  if(token) headers['Authorization'] = 'Bearer ' + token;

  let res;
  try{
    res = await fetch(API_BASE + path, Object.assign({}, options, { headers: headers }));
  }catch(networkErr){
    const err = new Error('Could not reach the server. Check your connection and try again.');
    err.isNetwork = true;
    throw err;
  }

  let data = null;
  try{ data = await res.json(); }catch(e){ /* no body */ }

  if(!res.ok){
    if(res.status === 401){
      clearToken();
      state.session.loggedIn = false;
      state.auth.screen = 'login';
    }
    const err = new Error((data && data.error) || 'Something went wrong.');
    err.status = res.status;
    throw err;
  }
  return data;
}

async function apiGet(path){ return api(path, { method:'GET' }); }
async function apiPost(path, body){ return api(path, { method:'POST', body: JSON.stringify(body || {}) }); }
async function apiPut(path, body){ return api(path, { method:'PUT', body: JSON.stringify(body || {}) }); }
async function apiDelete(path){ return api(path, { method:'DELETE' }); }

/* ---------------- data loaders (replace old localStorage calls) ---------------- */
async function loadAccount(){
  if(!getToken()) return null;
  try{ const r = await apiGet('/auth/me'); return r.account; }
  catch(e){ clearToken(); return null; }
}
async function loadCustomers(){
  try{
    const r = await apiGet('/customers?sort=' + state.ui.sortOrder + '&status=' + state.ui.statusFilter + (state.ui.search ? '&search=' + encodeURIComponent(state.ui.search) : ''));
    return r.customers;
  }catch(e){ return []; }
}
async function loadDashboardStats(){
  try{ return await apiGet('/dashboard/stats'); }
  catch(e){ return null; }
}
async function loadRecentCustomers(){
  try{ const r = await apiGet('/dashboard/recent'); return r.customers; }
  catch(e){ return []; }
}

/* ---------------- toast ---------------- */
function showToast(type, message){
  const tid = Date.now();
  state.ui.toast = { type:type, message:message, id:tid };
  paintToast();
  setTimeout(function(){
    if(state.ui.toast && state.ui.toast.id === tid){
      state.ui.toast = null;
      paintToast();
    }
  }, 3200);
}
function toastHTML(t){
  return '<div class="toast '+(t.type==='error'?'toast-error':'')+'">' +
    '<span class="toast-icon">'+icon(t.type==='error'?'alertTriangle':'check', 18)+'</span>' +
    '<span class="toast-text">'+escapeHtml(t.message)+'</span>' +
  '</div>';
}
function paintToast(){
  const region = document.getElementById('toast-region');
  if(region) region.innerHTML = state.ui.toast ? toastHTML(state.ui.toast) : '';
}

function showFieldError(id, msg){
  const input = document.getElementById(id);

  if(err){ err.textContent = msg; err.classList.add('show'); }
}
function clearFieldError(id){
  const input = document.getElementById(id);
  const err = document.getElementById(id+'Error');
  if(input) input.classList.remove('error');
  if(err){ err.textContent=''; err.classList.remove('show'); }
}

function updateDuePreview(){
  const t = parseFloat(document.getElementById('totalAmount').value);
  const p = parseFloat(document.getElementById('paidAmount').value);
  const total = isNaN(t) ? 0 : t;
  const paid = isNaN(p) ? 0 : p;
  const due = total - paid;
  const el = document.getElementById('dueAmountValue');
  if(el) el.textContent = fmt(due >= 0 ? due : 0);
  const warn = document.getElementById('dueWarning');
  if(warn){
    if(total > 0 && paid > total){ warn.classList.add('show'); }
    else { warn.classList.remove('show'); }
  }
}

async function handleAddDueSubmit(form){
  ['customerName','customerPhone','serviceDesc','totalAmount','paidAmount'].forEach(clearFieldError);

  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();
  const service = document.getElementById('serviceDesc').value.trim();
  const totalRaw = document.getElementById('totalAmount').value.trim();
  const paidRaw = document.getElementById('paidAmount').value.trim();

  let valid = true;
  if(!name || name.length < 2){ showFieldError('customerName','Enter the customer full name.'); valid=false; }
  if(!phone || !isValidPhone(phone)){ showFieldError('customerPhone','Enter a valid phone number (7-15 digits).'); valid=false; }
  if(!service || service.length < 2){ showFieldError('serviceDesc','Describe the service or product.'); valid=false; }

  const total = parseFloat(totalRaw);
  const paid = parseFloat(paidRaw);

  if(totalRaw==='' || isNaN(total) || total <= 0){ showFieldError('totalAmount','Enter a total amount greater than 0.'); valid=false; }
  if(paidRaw==='' || isNaN(paid) || paid < 0){ showFieldError('paidAmount','Enter a valid paid amount.'); valid=false; }
  else if(!isNaN(total) && total > 0 && paid > total){ showFieldError('paidAmount','Paid amount cannot exceed the total amount.'); valid=false; }

  if(!valid) return;

  const submitBtn = form.querySelector('button[type="submit"]');
  if(submitBtn) submitBtn.disabled = true;

  try{
    const r = await apiPost('/customers', { name: name, phone: phone, service: service, total: total, paid: paid });
    showToast('success', 'Due record saved for ' + name + '.');

    state.ui.search = '';
    state.ui.statusFilter = 'all';
    state.ui.page = 1;
    await navigate('customerList');

    // Offer a WhatsApp reminder right away for any new due balance.
    if(r.customer && r.customer.due > 0){
      openWhatsappReminder(r.customer.id);
    }
  }catch(e){
    showToast('error', e.message || 'Could not save the record. Please try again.');
    if(submitBtn) submitBtn.disabled = false;
  }
}

/* ---------------- WhatsApp reminders ---------------- */
async function openWhatsappReminder(customerId){
  try{
    const r = await apiGet('/customers/' + customerId + '/whatsapp-link');
    window.open(r.link, '_blank', 'noopener');
    showToast('success', 'WhatsApp reminder ready to send.');
  }catch(e){
    showToast('error', e.message || 'Could not generate the WhatsApp reminder.');
  }
}

/* ---------------- customer list page ---------------- */
function getFilteredCustomers(){
  let list = state.customers.slice();
  const q = state.ui.search.trim().toLowerCase();
  if(q){
    list = list.filter(function(c){
      return c.name.toLowerCase().indexOf(q) !== -1 || c.phone.toLowerCase().indexOf(q) !== -1;
    });
  }
  if(state.ui.statusFilter !== 'all'){
    const want = state.ui.statusFilter === 'pending' ? 'Pending' : 'Paid';
    list = list.filter(function(c){ return c.status === want; });
  }
  list.sort(function(a,b){
    const diff = new Date(b.createdAt) - new Date(a.createdAt);
    return state.ui.sortOrder === 'newest' ? diff : -diff;
  });
  return list;
}

function buildListControlsAndTable(){

  const pills =

      '<button type="button" class="pill '+(state.ui.statusFilter==='all'?'active':'')+'" data-action="set-filter:all">All <span class="pill-count">'+all+'</span></button>' +
      '<button type="button" class="pill '+(state.ui.statusFilter==='pending'?'active':'')+'" data-action="set-filter:pending">Pending <span class="pill-count">'+pendingCount+'</span></button>' +
      '<button type="button" class="pill '+(state.ui.statusFilter==='paid'?'active':'')+'" data-action="set-filter:paid">Paid <span class="pill-count">'+paidCount+'</span></button>' +

    '<button type="button" class="sort-btn" data-action="toggle-sort">'+icon('clock',14)+' '+(state.ui.sortOrder==='newest'?'Newest first':'Oldest first')+'</button>';

  if(all === 0){
    return '<div class="list-toolbar" style="margin-bottom:4px;">'+pills+'</div>' +
      '<div class="empty-state">' +
        '<div class="empty-icon">'+icon('inbox',26)+'</div>' +

        '<button type="button" class="btn btn-primary" data-action="navigate:addDue">'+icon('plusCircle',16)+' Add Due</button>' +
      '</div>';
  }

  const filtered = getFilteredCustomers();
  const totalPages = Math.max(1, Math.ceil(filtered.length / state.ui.pageSize));
  if(state.ui.page > totalPages) state.ui.page = totalPages;
  if(state.ui.page < 1) state.ui.page = 1;
  const startIdx = (state.ui.page - 1) * state.ui.pageSize;
  const pageRows = filtered.slice(startIdx, startIdx + state.ui.pageSize);

  let body;
  if(filtered.length === 0){
    body = '<div class="empty-state">' +
      '<div class="empty-icon">'+icon('search',26)+'</div>' +
      '<h4>No matching records</h4>' +
      '<p>Try a different search term or filter.</p>' +
      '<button type="button" class="btn btn-secondary" data-action="clear-filters">Clear filters</button>' +
    '</div>';
  } else {
    const rows = pageRows.map(renderRow).join('');
    body = '<div class="results-count">Showing '+(startIdx+1)+'–'+Math.min(startIdx+pageRows.length, filtered.length)+' of '+filtered.length+' customer'+(filtered.length===1?'':'s')+'</div>' +
      '<div class="table-wrap"><table><thead><tr>' +
        '<th>Customer</th><th>Phone</th><th>Service</th><th>Total</th><th>Paid</th><th>Due</th><th>Status</th><th>Date</th><th></th>' +
      '</tr></thead><tbody>'+rows+'</tbody></table></div>' +

        '<button type="button" class="page-nav-btn" data-action="go-page:prev" '+(state.ui.page<=1?'disabled':'')+'>'+icon('chevronLeft',16)+'</button>' +
        '<span class="page-label">Page '+state.ui.page+' of '+totalPages+'</span>' +
        '<button type="button" class="page-nav-btn" data-action="go-page:next" '+(state.ui.page>=totalPages?'disabled':'')+'>'+icon('chevronRight',16)+'</button>' +
      '</div>';
  }

  return '<div class="list-toolbar" style="margin-bottom:4px;">'+pills+'</div>' + body;

/* ---------------- shell / router ---------------- */
function renderShell(){
  const pageContent = state.route==='dashboard' ? renderDashboard()
    : state.route==='addDue' ? renderAddDuePage()
    : renderCustomerListPage();

  return '<div class="app-shell">' +
      '<div class="sidebar-overlay '+(state.ui.sidebarOpen?'show':'')+'" data-action="close-sidebar"></div>' +
      renderSidebar() +
      '<div class="main-area">' +
        renderTopbar() +
        '<main class="main-content">' + pageContent + '</main>' +
      '</div>' +
    '</div>' +
    (state.ui.modal ? renderModal() : '');
}

function renderApp(){
  const root = document.getElementById('app');
  let html = '<div id="toast-region">'+(state.ui.toast?toastHTML(state.ui.toast):'')+'</div>';

  if(!state.session.loggedIn){
    if(state.auth.screen === 'loading') html += renderLoading();
    else if(state.auth.screen === 'setup') html += renderSetup();
    else html += renderLogin();
  } else {
    html += renderShell();
  }

  root.innerHTML = html;
  document.body.classList.toggle('no-scroll', !!state.ui.modal || (state.ui.sidebarOpen && window.innerWidth < 1024));

  // auto-focus the search box if it exists and had focus context lost — skip, avoid stealing focus unexpectedly
}

async function navigate(route){
  state.route = route;
  state.ui.sidebarOpen = false;
  renderApp();
  window.scrollTo(0,0);

  if(route === 'dashboard'){
    await refreshDashboardData();
    if(state.route === 'dashboard') renderApp();
  } else if(route === 'customerList'){
    state.customers = await loadCustomers();
    if(state.route === 'customerList') renderApp();
  }
}

async function refreshDashboardData(){
  const stats = await loadDashboardStats();
  if(stats) state.dashboardStats = stats;
  state.recentCustomers = await loadRecentCustomers();
}

/* ---------------- auth handlers ---------------- */
function showAuthError(msg){
  const banner = document.getElementById('authError');
  const text = document.getElementById('authErrorText');
  if(banner && text){ text.textContent = msg; banner.classList.add('show'); }
}

async function handleSetupSubmit(){
  ['shopName','ownerEmail','ownerPassword'].forEach(clearFieldError);
  const banner = document.getElementById('authError');
  if(banner) banner.classList.remove('show');

  const shopName = document.getElementById('shopName').value.trim();
  const email = document.getElementById('ownerEmail').value.trim();
  const password = document.getElementById('ownerPassword').value;

  let valid = true;
  if(!shopName || shopName.length < 2){ showFieldError('shopName','Enter your shop or business name.'); valid=false; }
  if(!email || !isValidEmail(email)){ showFieldError('ownerEmail','Enter a valid email address.'); valid=false; }
  if(!password || password.length < 6){ showFieldError('ownerPassword','Use at least 6 characters.'); valid=false; }
  if(!valid) return;

  const submitBtn = document.querySelector('#setupForm button[type="submit"]');
  if(submitBtn) submitBtn.disabled = true;

  try{
    const r = await apiPost('/auth/register', { shopName: shopName, email: email, password: password });
    setToken(r.token);
    state.account = r.account;
    state.session.loggedIn = true;
    state.route = 'dashboard';
    await refreshDashboardData();
    renderApp();
    showToast('success', 'Welcome to DueTrack, ' + shopName + '!');
  }catch(e){
    showAuthError(e.message || 'Could not create your account. Please try again.');
    if(submitBtn) submitBtn.disabled = false;
  }
}

async function handleLoginSubmit(){
  ['loginEmail','loginPassword'].forEach(clearFieldError);
  const banner = document.getElementById('authError');
  if(banner) banner.classList.remove('show');

  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  let valid = true;
  if(!email || !isValidEmail(email)){ showFieldError('loginEmail','Enter a valid email address.'); valid=false; }
  if(!password){ showFieldError('loginPassword','Enter your password.'); valid=false; }
  if(!valid) return;

  const submitBtn = document.querySelector('#loginForm button[type="submit"]');
  if(submitBtn) submitBtn.disabled = true;

  try{
    const r = await apiPost('/auth/login', { email: email, password: password });
    setToken(r.token);
    state.account = r.account;
    state.session.loggedIn = true;
    state.route = 'dashboard';
    await refreshDashboardData();
    renderApp();
    showToast('success', 'Welcome back!');
  }catch(e){
    showAuthError(e.message || 'Incorrect email or password. Please try again.');
    if(submitBtn) submitBtn.disabled = false;
  }
}

function handleLogout(){
  clearToken();
  state.account = null;
  state.customers = [];
  state.session.loggedIn = false;
  state.auth.screen = 'login';
  state.ui.sidebarOpen = false;
  state.ui.search = '';
  state.ui.statusFilter = 'all';
  state.ui.page = 1;
  renderApp();
}

/* ---------------- delegated events ---------------- */
document.addEventListener('click', function(e){
  if(e.target.classList && e.target.classList.contains('modal-overlay')){
    state.ui.modal = null;
    state.ui.modalPayments = [];
    renderApp();
    return;
  }
  if(e.target.classList && e.target.classList.contains('sidebar-overlay')){
    state.ui.sidebarOpen = false;
    renderApp();
    return;
  }

  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;
  const parts = action.split(':');
  const key = parts[0];
  const arg = parts.slice(1).join(':');

  switch(key){
    case 'navigate': navigate(arg); break;
    case 'logout': handleLogout(); break;
    case 'toggle-sidebar': state.ui.sidebarOpen = !state.ui.sidebarOpen; renderApp(); break;
    case 'close-sidebar': state.ui.sidebarOpen = false; renderApp(); break;
    case 'goto-login': state.auth.screen = 'login'; renderApp(); break;
    case 'goto-setup': state.auth.screen = 'setup'; renderApp(); break;
    case 'view':
      state.ui.modal = { type:'view', id:arg };
      state.ui.modalPayments = [];
      state.ui.modalPaymentsLoading = true;
      renderApp();
      apiGet('/customers/' + arg + '/payments').then(function(r){
        state.ui.modalPayments = r.payments;
        state.ui.modalPaymentsLoading = false;
        if(state.ui.modal && state.ui.modal.id === arg) renderApp();
      }).catch(function(){
        state.ui.modalPaymentsLoading = false;
        if(state.ui.modal && state.ui.modal.id === arg) renderApp();
      });
      break;
    case 'edit': state.ui.modal = { type:'edit', id:arg }; renderApp(); break;
    case 'record-payment': state.ui.modal = { type:'payment', id:arg }; renderApp(); break;
    case 'delete': state.ui.modal = { type:'delete', id:arg }; renderApp(); break;
    case 'send-reminder': openWhatsappReminder(arg); break;
    case 'export-csv': exportData('csv'); break;
    case 'export-pdf': exportData('pdf'); break;
    case 'confirm-delete': {
      const target = state.customers.find(function(c){ return c.id===arg; });
      el.disabled = true;
      apiDelete('/customers/' + arg).then(function(){
        state.customers = state.customers.filter(function(c){ return c.id !== arg; });
        state.ui.modal = null;
        renderApp();
        showToast('success', target ? ('Record for ' + target.name + ' deleted.') : 'Record deleted.');
        refreshDashboardData();
      }).catch(function(err){
        el.disabled = false;
        showToast('error', err.message || 'Could not delete the record.');
      });
      break;
    }
    case 'close-modal': state.ui.modal = null; state.ui.modalPayments = []; renderApp(); break;
    case 'set-filter': state.ui.statusFilter = arg; state.ui.page = 1; refreshTableRegion(); break;
    case 'toggle-sort': state.ui.sortOrder = state.ui.sortOrder === 'newest' ? 'oldest' : 'newest'; refreshTableRegion(); break;
    case 'go-page':
      if(arg === 'prev') state.ui.page = Math.max(1, state.ui.page - 1);
      else if(arg === 'next') state.ui.page = state.ui.page + 1;
      refreshTableRegion();
      break;
    case 'clear-filters':
      state.ui.search = ''; state.ui.statusFilter = 'all'; state.ui.page = 1;
      const si = document.getElementById('searchInput'); if(si) si.value = '';
      refreshTableRegion();
      break;
  }
});

/* ---------------- export to CSV / PDF ---------------- */
async function exportData(format){
  try{
    const token = getToken();
    const res = await fetch(API_BASE + '/export/' + format, {
      headers: token ? { 'Authorization': 'Bearer ' + token } : {}
    });
    if(!res.ok){
      const body = await res.json().catch(function(){ return {}; });
      throw new Error(body.error || 'Export failed.');
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'duetrack-export.' + format;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('success', (format === 'csv' ? 'CSV' : 'PDF') + ' export downloaded.');
  }catch(e){
    showToast('error', e.message || 'Could not export data.');
  }
}

document.addEventListener('input', function(e){
  if(e.target.id === 'searchInput'){
    state.ui.search = e.target.value;
    state.ui.page = 1;
    refreshTableRegion();
  } else if(e.target.id === 'totalAmount' || e.target.id === 'paidAmount'){
    updateDuePreview();
  }
});

document.addEventListener('submit', function(e){
  if(!e.target || !e.target.id) return;
  if(e.target.id === 'setupForm'){ e.preventDefault(); handleSetupSubmit(); }
  else if(e.target.id === 'loginForm'){ e.preventDefault(); handleLoginSubmit(); }
  else if(e.target.id === 'addDueForm'){ e.preventDefault(); handleAddDueSubmit(e.target); }
  else if(e.target.id === 'editCustomerForm'){ e.preventDefault(); handleEditCustomerSubmit(e.target); }
  else if(e.target.id === 'paymentForm'){ e.preventDefault(); handlePaymentSubmit(e.target); }
});

/* ---------------- edit customer ---------------- */
async function handleEditCustomerSubmit(form){
  ['editName','editPhone','editService','editTotal'].forEach(clearFieldError);
  const id = form.dataset.id;

  const name = document.getElementById('editName').value.trim();
  const phone = document.getElementById('editPhone').value.trim();
  const service = document.getElementById('editService').value.trim();
  const totalRaw = document.getElementById('editTotal').value.trim();

  let valid = true;
  if(!name || name.length < 2){ showFieldError('editName','Enter the customer full name.'); valid=false; }
  if(!phone || !isValidPhone(phone)){ showFieldError('editPhone','Enter a valid phone number.'); valid=false; }
  const total = parseFloat(totalRaw);
  if(totalRaw==='' || isNaN(total) || total < 0){ showFieldError('editTotal','Enter a valid total amount.'); valid=false; }
  if(!valid) return;

  const submitBtn = form.querySelector('button[type="submit"]');
  if(submitBtn) submitBtn.disabled = true;

  try{
    await apiPut('/customers/' + id, { name: name, phone: phone, service: service, total: total });
    showToast('success', 'Record updated for ' + name + '.');
    state.ui.modal = null;
    state.customers = await loadCustomers();
    renderApp();
    refreshDashboardData();
  }catch(e){
    showToast('error', e.message || 'Could not update the record.');
    if(submitBtn) submitBtn.disabled = false;
  }
}

/* ---------------- record payment ---------------- */
async function handlePaymentSubmit(form){
  clearFieldError('paymentAmount');
  const id = form.dataset.id;
  const amountRaw = document.getElementById('paymentAmount').value.trim();
  const note = document.getElementById('paymentNote').value.trim();
  const amount = parseFloat(amountRaw);

  if(amountRaw === '' || isNaN(amount) || amount <= 0){
    showFieldError('paymentAmount', 'Enter a valid payment amount.');
    return;
  }

  const submitBtn = form.querySelector('button[type="submit"]');
  if(submitBtn) submitBtn.disabled = true;

  try{
    const r = await apiPost('/customers/' + id + '/payments', { amount: amount, note: note });
    state.ui.modal = null;
    state.customers = await loadCustomers();
    renderApp();
    refreshDashboardData();
    showToast('success', r.customer.status === 'Paid'
      ? 'Payment recorded — balance fully cleared!'
      : 'Payment of ' + fmt(amount) + ' recorded.');
  }catch(e){
    showFieldError('paymentAmount', e.message || 'Could not record the payment.');
    if(submitBtn) submitBtn.disabled = false;
  }
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape' && state.ui.modal){
    state.ui.modal = null;
    renderApp();
  }
});

/* ---------------- init ---------------- */
async function init(){
  state.auth.screen = 'loading';
  renderApp();

  const existingAccount = await loadAccount(); // resolves only if a valid token is already stored

  if(existingAccount){
    state.account = existingAccount;
    state.session.loggedIn = true;
    state.route = 'dashboard';
    await refreshDashboardData();
  } else {
    state.auth.screen = 'login'; // multi-tenant app: default to login, with a link to register
  }
  renderApp();
}
init();
</script>
